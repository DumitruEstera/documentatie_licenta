h="333.9703" x="490.5" y="717.603">backbone dezghe&#539;at, rat&#259; de &#238;nv&#259;&#539;are de 10&#215; mai mic&#259;</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="185.6791" x="490.5" y="735.309">dec&#226;t a stratului de clasificare</text></g><!--entity Normal--><g id="elem_Normal"><rect fill="#E0E0E0" height="55.412" rx="4" ry="4" style="stroke:#333333;stroke-width:0.5;" width="214.4282" x="550.5" y="13.5"/><text fill="#111111" font-family="Serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="35.178" x="560.5" y="37.397">Clasa</text><text fill="#111111" font-family="monospace" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="46.96" x="599.058" y="38.1401">normal</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="194.4282" x="560.5" y="55.103">activitate obi&#537;nuit&#259; (RWF-2000)</text></g><!--entity Fight--><g id="elem_Fight"><rect fill="#E0E0E0" height="55.412" rx="4" ry="4" style="stroke:#333333;stroke-width:0.5;" width="193.1992" x="800" y="13.5"/><text fill="#111111" font-family="Serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="35.178" x="810" y="37.397">Clasa</text><text fill="#111111" font-family="monospace" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="39.1333" x="848.558" y="38.1401">fight</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="173.1992" x="810" y="55.103">lupte / alterca&#539;ii (RWF-2000)</text></g><!--entity Vand--><g id="elem_Vand"><rect fill="#E0E0E0" height="55.412" rx="4" ry="4" style="stroke:#333333;stroke-width:0.5;" width="223.4762" x="7" y="13.5"/><text fill="#111111" font-family="Serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="35.178" x="17" y="37.397">Clasa</text><text fill="#111111" font-family="monospace" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="70.4399" x="55.558" y="38.1401">vandalism</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="203.4762" x="17" y="55.103">set de date propriu &#8212; 614 clipuri</text></g><g id="elem_GMN5"><path d="M265.5,10 L265.5,37 L230.06,41 L265.5,45 L265.5,71.9276 A4,4 0 0 0 269.5,75.9276 L511.2433,75.9276 A4,4 0 0 0 515.2433,71.9276 L515.2433,16 L505.2433,6 L269.5,6 A4,4 0 0 0 265.5,10 " fill="#FFF3E0" style="stroke:#B0792C;stroke-width:0.5;"/><path d="M505.2433,6 L505.2433,14 A2,2 0 0 0 507.2433,16 L515.2433,16 L505.2433,6 " fill="#FFF3E0" style="stroke:#B0792C;stroke-width:0.5;"/><text fill="#111111" font-family="Serif" font-size="11" lengthAdjust="spacing" textLength="162.2708" x="271.5" y="22.7589">Construit de la zero, &#238;n 3 etape:</text><text fill="#111111" font-family="Serif" font-size="11" lengthAdjust="spacing" textLength="192.6086" x="271.5" y="37.7408">1. scraping YouTube (~4.800 link-uri)</text><text fill="#111111" font-family="Serif" font-size="11" lengthAdjust="spacing" textLength="206.0835" x="271.5" y="52.7227">2. filtrare manual&#259; (&gt;600 clipuri valide)</text><text fill="#111111" font-family="Serif" font-size="11" lengthAdjust="spacing" textLength="228.7433" x="271.5" y="67.7046">3. editare &#238;n OpenShot (decupare segmente)</text></g><!--entity DS--><g id="elem_DS"><rect fill="#D7E9FF" height="73.118" rx="4" ry="4" style="stroke:#333333;stroke-width:0.5;" width="374.6404" x="470" y="136"/><text fill="#111111" font-family="Serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="71.8381" x="480" y="159.897">Set de date</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="93.1841" x="555.2181" y="159.897">&#8212; 2.538 clipuri</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="354.6404" x="480" y="177.603">&#238;mp&#259;r&#539;ire la nivel de fi&#537;ier: 2.097 antrenare / 441 validare</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="150.0981" x="480" y="195.309">directoare fizic separate</text></g><!--entity Pack--><g id="elem_Pack"><rect fill="#D7E9FF" height="90.8241" rx="4" ry="4" style="stroke:#333333;stroke-width:0.5;" width="329.2314" x="493" y="269"/><text fill="#111111" font-family="Serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="268.0083" x="503" y="292.897">Preg&#259;tirea intr&#259;rilor (contract SlowFast)</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="280.6818" x="503" y="310.603">clip de 2 s &#8594; e&#537;antionare uniform&#259; a cadrelor</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="309.2314" x="503" y="328.309">calea Slow: 8 cadre &#183; calea Fast: 32 cadre &#183; 224&#215;224</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="239.6942" x="503" y="346.0151">normalizare cu statisticile Kinetics-400</text></g><!--entity Model--><g id="elem_Model"><rect fill="#D7E9FF" height="73.118" rx="4" ry="4" style="stroke:#333333;stroke-width:0.5;" width="396.0527" x="459.5" y="420"/><text fill="#111111" font-family="Serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="86.5151" x="469.5" y="443.897">SlowFast-R50</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="170.2481" x="559.3951" y="443.897">(pre-antrenat: Kinetics-400)</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="178.1911" x="469.5" y="461.603">Adaptare strat de clasificare:</text><text fill="#111111" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="133.0532" x="469.5" y="480.0521">Linear(2304,&#160;400)</text><text fill="#111111" font-family="Serif" font-size="13" lengthAdjust="spacing" textLength="10.8926" x="605.9332"